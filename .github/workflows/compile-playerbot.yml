name: Compile against AzerothCore Playerbot

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux:
    name: Linux / AzerothCore Playerbot
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout AzerothCore Playerbot
        uses: actions/checkout@v4
        with:
          repository: mod-playerbots/azerothcore-wotlk
          ref: Playerbot
          path: azerothcore
          submodules: recursive

      - name: Checkout mod-multibot-bridge
        uses: actions/checkout@v4
        with:
          path: azerothcore/modules/mod-multibot-bridge

      - name: Install Linux requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake make gcc g++ clang \
            libmysqlclient-dev libssl-dev libbz2-dev \
            libreadline-dev libncurses-dev mysql-server libboost-all-dev

      - name: Configure CMake
        run: |
          cmake -S azerothcore -B build-linux \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++

      - name: Build
        run: |
          cmake --build build-linux --config Release --parallel 2

  windows:
    name: Windows / AzerothCore Playerbot
    runs-on: windows-latest

    env:
      BOOST_ROOT: 'C:\local\boost_1_82_0'

    steps:
      - name: Checkout AzerothCore Playerbot
        uses: actions/checkout@v4
        with:
          repository: mod-playerbots/azerothcore-wotlk
          ref: Playerbot
          path: azerothcore
          submodules: recursive

      - name: Checkout mod-multibot-bridge
        uses: actions/checkout@v4
        with:
          path: azerothcore/modules/mod-multibot-bridge

      - name: Move repo to short path
        shell: bash
        run: |
          mkdir -p /c/ac
          cp -a azerothcore/. /c/ac/

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.13

      - name: Configure Windows requirements
        shell: bash
        env:
          CONTINUOUS_INTEGRATION: true
        run: |
          cd /c/ac
          ./acore.sh install-deps

      - name: Build
        shell: bash
        run: |
          cd /c/ac
          export CTOOLS_BUILD=all
          ./acore.sh compiler build

  macos:
    name: macOS / AzerothCore Playerbot
    runs-on: macos-14

    steps:
      - name: Checkout AzerothCore Playerbot
        uses: actions/checkout@v4
        with:
          repository: mod-playerbots/azerothcore-wotlk
          ref: Playerbot
          path: azerothcore
          submodules: recursive

      - name: Checkout mod-multibot-bridge
        uses: actions/checkout@v4
        with:
          path: azerothcore/modules/mod-multibot-bridge

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache:macos-14:${{ github.ref_name }}
          restore-keys: |
            ccache:macos-14:

      - name: Reset ccache stats
        shell: bash
        run: |
          ccache -z || true

      - name: Install latest bash
        run: |
          brew install bash

      - name: Configure macOS requirements
        shell: bash
        working-directory: azerothcore
        run: |
          source ./acore.sh install-deps

      - name: Build
        shell: bash
        working-directory: azerothcore
        run: |
          source ./apps/ci/mac/ci-compile.sh

      - name: ccache stats
        shell: bash
        run: |
          ccache -s || true